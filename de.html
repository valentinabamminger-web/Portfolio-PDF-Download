<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Download (Deutsch)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      margin-bottom: 2rem;
    }
    a.download-btn {
      display: inline-block;
      background-color: #1F1F1F;
      color: white;
      padding: 15px 25px;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    a.download-btn:hover {
      background-color: #E8E5DF;
      color: black;
    }
    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Portfolio PDF Download</h1>
  <p>Klicke auf den Button, um das Portfolio herunterzuladen. 💫</p>

  <a href="portfolio-deutsch.pdf" class="download-btn" download="Portfolio_ValentinaBamminger_DE.pdf">
    Portfolio herunterladen
  </a>

  <footer>
    &copy; 2026 Valentina Bamminger
  </footer>
</body>
</html>
